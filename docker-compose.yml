services:
 db:
  image: postgres:16
  environment:
   POSTGRES_USER: seenit
   POSTGRES_PASSWORD: seenit
   POSTGRES_DB: seenit
  volumes: 
   - postgres_data:/var/lib/postgresql/data
  healthcheck:
   test: ["CMD-SHELL", "pg_isready -U seenit"]
   interval: 5s
   timeout: 3s
   retries: 5

 
 api: 
  build: . 
  ports:
   - "8000:8000"
  depends_on: 
   db:
    condition: service_healthy
  env_file:
   - .env
  environment:
   DATABASE_URL: postgresql://seenit:seenit@db:5432/seenit
volumes: 
  postgres_data:
